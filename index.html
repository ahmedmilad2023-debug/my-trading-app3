<script>
// ============================================================
// ACTIVATION SYSTEM
// ============================================================
const MASTER_PASSWORD = 'AhmedMaster2026';
const USDT_WALLET = 'TVkLCorN25YqC9t2FfndJF7YZVWAjY61FT';
let subscriptionEnd = null;

function loadActivation(){
try{
const saved = localStorage.getItem('crypto_signals_activation');
if(saved){
const data = JSON.parse(saved);
if(data && data.endDate){
const end = new Date(data.endDate);
if(end > new Date()){
subscriptionEnd = end;
return true;
}else{
localStorage.removeItem('crypto_signals_activation');
return false;
}
}
}
return false;
}catch(e){return false;}
}

function saveActivation(endDate){
localStorage.setItem('crypto_signals_activation', JSON.stringify({endDate: endDate.toISOString()}));
subscriptionEnd = endDate;
}

function verifyActivation(){
const input = document.getElementById('activationCode');
const code = input.value.trim();
const errorEl = document.getElementById('activationError');
if(!code){
errorEl.style.display = 'block';
errorEl.textContent = '⚠️ الرجاء إدخال الكود';
return;
}
if(code === MASTER_PASSWORD){
const end = new Date();
end.setFullYear(end.getFullYear() + 10);
saveActivation(end);
document.getElementById('activationOverlay').style.display = 'none';
document.getElementById('app').style.display = 'block';
showToast('🔓 مرحباً أيها المطور! تم التفعيل مدى الحياة');
initApp();
return;
}
if(code.length === 10){
const end = new Date();
end.setDate(end.getDate() + 30);
saveActivation(end);
document.getElementById('activationOverlay').style.display = 'none';
document.getElementById('app').style.display = 'block';
showToast('✅ تم التفعيل بنجاح! اشتراكك صالح لمدة 30 يوماً');
initApp();
return;
}
errorEl.style.display = 'block';
errorEl.textContent = '❌ كود غير صحيح! جرب مرة أخرى';
}

function checkSubscription(){
if(!subscriptionEnd) return false;
const now = new Date();
if(now > subscriptionEnd){
document.getElementById('app').style.display = 'none';
document.getElementById('activationOverlay').style.display = 'flex';
document.getElementById('activationTitle').textContent = '⛔ انتهى اشتراكك';
document.getElementById('activationDesc').textContent = 'يرجى التجديد عبر تحويل المبلغ إلى محفظة USDT:';
document.getElementById('activationSub').innerHTML = `
<div class="wallet">${USDT_WALLET}</div>
📅 اشتراكك انتهى في ${subscriptionEnd.toLocaleDateString('ar-EG')}
<br>🔑 استخدم كود المطور للدخول المباشر
`;
document.getElementById('activationCode').placeholder = 'كود التفعيل أو كود المطور';
document.getElementById('activationCode').value = '';
document.getElementById('activationBtn').textContent = '🔄 تفعيل الاشتراك';
return false;
}
return true;
}

// ============================================================
// KONSTANTS
// ============================================================
const SYMBOLS = ['ADAUSDT','SOLUSDT','LINKUSDT','AVAXUSDT','ETHUSDT','BTCUSDT'];
const SYMBOL_NAMES = {
'ADAUSDT':'Cardano / USD','SOLUSDT':'Solana / USD',
'LINKUSDT':'Chainlink / USD','AVAXUSDT':'Avalanche / USD',
'ETHUSDT':'Ethereum / USD','BTCUSDT':'Bitcoin / USD'
};
const BASE_URL = 'https://api.binance.com/api/v3';
const WS_URL = 'wss://stream.binance.com:9443/ws';
const LOOKBACK = 50;
const KLINES_LIMIT = 100;
const LEVERAGE = 50;
const RISK_REWARD = 3;

// ============================================================
// STATE
// ============================================================
let allSignals = [];
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let currentTab = 'all';
let showFavoritesOnly = false;
let ws = null;
let toastTimer = null;
let signalHistory = JSON.parse(localStorage.getItem('signal_history') || '[]');

// ============================================================
// DOM REFS
// ============================================================
const container = document.getElementById('signalsContainer');
const totalCount = document.getElementById('totalCount');
const buyCount = document.getElementById('buyCount');
const sellCount = document.getElementById('sellCount');
const favCount = document.getElementById('favCount');
const favToggleBtn = document.getElementById('favToggleBtn');

// ============================================================
// TOAST
// ============================================================
function showToast(msg){
const el = document.getElementById('toast');
el.textContent = msg;
el.classList.add('show');
clearTimeout(toastTimer);
toastTimer = setTimeout(()=>el.classList.remove('show'),2500);
}

// ============================================================
// SIGNAL HISTORY (لحفظ التوقيت الثابت)
// ============================================================
function saveSignalToHistory(signal){
const existing = signalHistory.findIndex(s => s.symbol === signal.symbol);
if(existing > -1){
signalHistory[existing] = signal;
}else{
signalHistory.push(signal);
}
if(signalHistory.length > 100){
signalHistory = signalHistory.slice(-100);
}
localStorage.setItem('signal_history', JSON.stringify(signalHistory));
}

function getSignalFromHistory(symbol){
return signalHistory.find(s => s.symbol === symbol) || null;
}

// ============================================================
// FAVORITES
// ============================================================
function toggleFavorite(symbol){
const idx = favorites.indexOf(symbol);
if(idx>-1){ favorites.splice(idx,1); showToast('❌ تمت الإزالة من المفضلة'); }
else { favorites.push(symbol); showToast('❤️ تمت الإضافة إلى المفضلة'); }
localStorage.setItem('favorites', JSON.stringify(favorites));
renderSignals();
updateStats();
}

function toggleFavoritesView(){
showFavoritesOnly = !showFavoritesOnly;
favToggleBtn.textContent = showFavoritesOnly ? '📋 الكل' : '⭐ المفضلة';
favToggleBtn.classList.toggle('active', showFavoritesOnly);
renderSignals();
updateStats();
}

// ============================================================
// TAB SWITCH
// ============================================================
function switchTab(tab){
currentTab = tab;
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
renderSignals();
updateStats();
}

// ============================================================
// SHARE FUNCTION
// ============================================================
function shareSignal(signal){
const text = `📊 إشارة ${signal.action} لـ ${signal.symbol.replace('USDT','/USD')}
💰 سعر الدخول: $${signal.entryPrice.toFixed(4)}
🎯 الهدف: $${signal.target.toFixed(4)} (رافعة ${LEVERAGE}x)
🛑 وقف الخسارة: $${signal.stopLoss.toFixed(4)}
📈 الثقة: ${signal.confidence}%
📅 تاريخ الصدور: ${signal.signalDate}
⏰ وقت الصدور: ${signal.signalTime}
📝 التحليل: ${signal.analysis}
🔹 السيولة: ${'⭐'.repeat(Math.min(5,Math.max(1,signal.liquidityScore||1)))}
#تداول #عملات_رقمية #سيولة #OrderBlock`;
if(navigator.share){
navigator.share({title:'إشارة تداول', text:text}).catch(()=>{});
}else{
navigator.clipboard.writeText(text).then(()=>{
showToast('📋 تم نسخ الإشارة للحافظة!');
}).catch(()=>{
showToast('⚠️ تعذر المشاركة');
});
}
}

// ============================================================
// SMART MONEY ENGINE
// ============================================================
function generateAnalysis(symbol, isBullish, ob, liq){
let analysis = '';
if(isBullish){
if(ob && ob.type==='BUY'){
analysis = `ارتداد من منطقة طلب (Order Block) عند $${ob.level.toFixed(4)} بقوة ${ob.strength}%`;
}else if(liq && liq.type==='LOW'){
analysis = `كسر هيكل السوق مع سيولة منخفضة عند $${liq.price.toFixed(4)}`;
}else{
analysis = `تكوين منطقة طلب جديدة مع زخم صاعد`;
}
}else{
if(ob && ob.type==='SELL'){
analysis = `ارتداد من منطقة عرض (Order Block) عند $${ob.level.toFixed(4)} بقوة ${ob.strength}%`;
}else if(liq && liq.type==='HIGH'){
analysis = `كسر هيكل السوق مع سيولة عالية عند $${liq.price.toFixed(4)}`;
}else{
analysis = `تكوين منطقة عرض جديدة مع زخم هابط`;
}
}
return analysis;
}

function analyzeSmartMoney(symbol, klines, currentPrice){
if(!klines || klines.length < LOOKBACK) return null;
const orderBlocks = findOrderBlocks(klines);
const liquidityLevels = findLiquidityLevels(klines);
const liquidityScore = calcLiquidityScore(klines);

const nearestBuy = orderBlocks.filter(ob=>ob.type==='BUY').sort((a,b)=>Math.abs(a.level-currentPrice)-Math.abs(b.level-currentPrice))[0]||null;
const nearestSell = orderBlocks.filter(ob=>ob.type==='SELL').sort((a,b)=>Math.abs(a.level-currentPrice)-Math.abs(b.level-currentPrice))[0]||null;
const nearLiqHigh = liquidityLevels.filter(l=>l.type==='HIGH').sort((a,b)=>Math.abs(a.price-currentPrice)-Math.abs(b.price-currentPrice))[0]||null;
const nearLiqLow = liquidityLevels.filter(l=>l.type==='LOW').sort((a,b)=>Math.abs(a.price-currentPrice)-Math.abs(b.price-currentPrice))[0]||null;

let isBullish = false;
if(nearestBuy && Math.abs(nearestBuy.level-currentPrice)/currentPrice < 0.02) isBullish = true;
else if(nearLiqLow && Math.abs(nearLiqLow.price-currentPrice)/currentPrice < 0.015) isBullish = true;
else if(nearestSell && Math.abs(nearestSell.level-currentPrice)/currentPrice < 0.02) isBullish = false;
else if(nearLiqHigh && Math.abs(nearLiqHigh.price-currentPrice)/currentPrice < 0.015) isBullish = false;
else {
const buyDist = nearestBuy ? Math.abs(nearestBuy.level-currentPrice) : Infinity;
const sellDist = nearestSell ? Math.abs(nearestSell.level-currentPrice) : Infinity;
isBullish = buyDist < sellDist;
}

const action = isBullish ? 'شراء' : 'بيع';
let stopDistancePercent = 0.02;
if(isBullish && nearLiqLow){
stopDistancePercent = (currentPrice - nearLiqLow.price) / currentPrice;
} else if(!isBullish && nearLiqHigh){
stopDistancePercent = (nearLiqHigh.price - currentPrice) / currentPrice;
}
stopDistancePercent = Math.max(0.005, Math.min(0.05, stopDistancePercent));
const targetDistancePercent = stopDistancePercent * RISK_REWARD;

let target, stopLoss;
if(isBullish){
stopLoss = currentPrice * (1 - stopDistancePercent);
target = currentPrice * (1 + targetDistancePercent);
} else {
stopLoss = currentPrice * (1 + stopDistancePercent);
target = currentPrice * (1 - targetDistancePercent);
}
const maxTargetDistance = 0.15;
if(Math.abs(target - currentPrice)/currentPrice > maxTargetDistance){
if(isBullish){ target = currentPrice * (1 + maxTargetDistance); }
else { target = currentPrice * (1 - maxTargetDistance); }
}

const ob = isBullish ? nearestBuy : nearestSell;
const liq = isBullish ? nearLiqLow : nearLiqHigh;
const confidence = calcConfidence(ob, liq, liquidityScore);

const existingSignal = getSignalFromHistory(symbol);
let signalDate, signalTime;
if(existingSignal){
signalDate = existingSignal.signalDate;
signalTime = existingSignal.signalTime;
}else{
const now = new Date();
signalDate = now.toLocaleDateString('ar-EG');
signalTime = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
}

const analysis = generateAnalysis(symbol, isBullish, ob, liq);

const newSignal = {
symbol, action, entryPrice: currentPrice, currentPrice,
target, stopLoss,
orderBlock: ob,
liquidityLevel: liq,
liquidityScore,
isBullish,
confidence,
leverage: LEVERAGE,
riskReward: RISK_REWARD,
signalDate: signalDate,
signalTime: signalTime,
analysis: analysis,
lastUpdate: new Date().toISOString()
};

saveSignalToHistory(newSignal);

return newSignal;
}

function findOrderBlocks(klines){
const blocks = [];
for(let i=1;i<klines.length-1;i++){
const prev = klines[i-1];
const curr = klines[i];
if(curr.close > curr.open && curr.volume > prev.volume * 1.5 && curr.close > prev.high){
const strength = Math.min(100, Math.max(1, Math.round((curr.volume/prev.volume)*20)));
blocks.push({level:curr.open, type:'BUY', strength, volume:curr.volume, timestamp:curr.openTime});
}
if(curr.close < curr.open && curr.volume > prev.volume * 1.5 && curr.close < prev.low){
const strength = Math.min(100, Math.max(1, Math.round((curr.volume/prev.volume)*20)));
blocks.push({level:curr.open, type:'SELL', strength, volume:curr.volume, timestamp:curr.openTime});
}
}
return blocks.slice(-10);
}

function findLiquidityLevels(klines){
const levels = [];
if(klines.length < LOOKBACK) return levels;
const recent = klines.slice(-LOOKBACK);
for(let i=1;i<recent.length-1;i++){
const curr = recent[i], prev = recent[i-1], next = recent[i+1];
if(curr.high > prev.high && curr.high > next.high){
levels.push({price:curr.high, type:'HIGH', volume:curr.volume, timestamp:curr.openTime});
}
if(curr.low < prev.low && curr.low < next.low){
levels.push({price:curr.low, type:'LOW', volume:curr.volume, timestamp:curr.openTime});
}
}
return levels.slice(-10);
}

function calcLiquidityScore(klines){
if(!klines.length) return 1;
const avg = klines.reduce((s,k)=>s+k.volume,0)/klines.length;
const recent = klines.slice(-5).reduce((s,k)=>s+k.volume,0)/5;
if(recent > avg*2) return 5;
if(recent > avg*1.5) return 4;
if(recent > avg) return 3;
if(recent > avg*0.5) return 2;
return 1;
}

function calcConfidence(ob, liq, score){
let c = 50;
if(ob) c += Math.min(25, Math.round(ob.strength/2));
if(liq) c += 10;
c += Math.min(15, score*5);
return Math.min(100, Math.max(0, c));
}

// ============================================================
// BINANCE API
// ============================================================
async function fetchKlines(symbol){
const url = `${BASE_URL}/klines?symbol=${symbol}&interval=1h&limit=${KLINES_LIMIT}`;
const res = await fetch(url);
const data = await res.json();
return data.map(k=>({
openTime:k[0], open:parseFloat(k[1]), high:parseFloat(k[2]),
low:parseFloat(k[3]), close:parseFloat(k[4]), volume:parseFloat(k[5]),
closeTime:k[6], quoteVolume:parseFloat(k[7]), trades:k[8],
takerBuyBaseVolume:parseFloat(k[9]), takerBuyQuoteVolume:parseFloat(k[10]), ignore:parseFloat(k[11])
}));
}

async function fetchTicker(symbol){
const url = `${BASE_URL}/ticker/24hr?symbol=${symbol}`;
const res = await fetch(url);
const data = await res.json();
return {
symbol:data.symbol,
priceChangePercent:data.priceChangePercent,
lastPrice:data.lastPrice,
volume:data.volume,
quoteVolume:data.quoteVolume,
highPrice:data.highPrice,
lowPrice:data.lowPrice,
openPrice:data.openPrice
};
}

// ============================================================
// WEBSOCKET
// ============================================================
function connectWebSocket(){
if(ws) { ws.close(); ws=null; }
const streams = SYMBOLS.map(s=>s.toLowerCase()+'@ticker').join('/');
const url = `${WS_URL}/stream?streams=${streams}`;
ws = new WebSocket(url);
ws.onmessage = (e)=>{
try {
const json = JSON.parse(e.data);
const data = json.data;
if(data && data.s && data.c){
const symbol = data.s;
const price = parseFloat(data.c);
const idx = allSignals.findIndex(s=>s.symbol===symbol);
if(idx>-1){
allSignals[idx].currentPrice = price;
allSignals[idx].entryPrice = allSignals[idx].entryPrice || price;
const histIdx = signalHistory.findIndex(s=>s.symbol===symbol);
if(histIdx>-1){
signalHistory[histIdx].currentPrice = price;
localStorage.setItem('signal_history', JSON.stringify(signalHistory));
}
renderSignals();
updateStats();
}
}
} catch(err){}
};
ws.onclose = ()=>{
setTimeout(connectWebSocket, 5000);
};
}

// ============================================================

// ============================================================
async function loadAllData(){
try {
const signals = [];
for(const sym of SYMBOLS){
const [ticker, klines] = await Promise.all([fetchTicker(sym), fetchKlines(sym)]);
const currentPrice = parseFloat(ticker.lastPrice);
const signal = analyzeSmartMoney(sym, klines, currentPrice);
if(signal) signals.push(signal);
}
allSignals = signals;
renderSignals();
updateStats();
if(!ws || ws.readyState !== WebSocket.OPEN) connectWebSocket();
} catch(err){
container.innerHTML = `<div class="error-box">⚠️ خطأ في تحميل البيانات: ${err.message}<br><button onclick="loadAllData()">إعادة المحاولة</button></div>`;
}
}

function refreshData(){
container.innerHTML = `<div class="loading"><div class="spinner"></div><p style="margin-top:8px">جاري التحديث...</p></div>`;

}

function updateStats(){
const total = allSignals.length;
const buys = allSignals.filter(s=>s.isBullish).length;
const sells = total - buys;
const favs = allSignals.filter(s=>favorites.includes(s.symbol)).length;
totalCount.textContent = `📈 ${total}`;
buyCount.textContent = `🟢 ${buys}`;
sellCount.textContent = `🔴 ${sells}`;
favCount.textContent = `⭐ ${favs}`;
}
